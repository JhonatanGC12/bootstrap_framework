<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Discord Bootstrap Clone</title>

</head>

<body>

    <div class="d-flex vh-100">

        <!-- SERVERS (desktop) -->
        <div class="d-none d-lg-flex flex-column align-items-center gap-2 py-3 bg-app-dark" style="width:72px">

            <div class="server d-flex align-items-center justify-content-center bg-primary text-white rounded-circle">
                <i class="bi bi-discord"></i>
            </div>

            <div
                class="server d-flex align-items-center justify-content-center bg-secondary text-white rounded-circle active">
                S1
            </div>

            <div class="server d-flex align-items-center justify-content-center bg-secondary text-white rounded-circle">
                S2
            </div>

        </div>

        <!-- OFFCANVAS SERVERS (mobile) -->
        <div class="offcanvas offcanvas-start bg-app-dark text-white" tabindex="-1" id="serversMobile">
            <div class="offcanvas-body d-flex flex-column align-items-center gap-2">

                <div class="server d-flex align-items-center justify-content-center bg-primary rounded-circle">D</div>
                <div class="server d-flex align-items-center justify-content-center bg-secondary rounded-circle">S1
                </div>
                <div class="server d-flex align-items-center justify-content-center bg-secondary rounded-circle">S2
                </div>

            </div>
        </div>

        <!-- CHANNELS -->
        <div class="bg-side text-white d-flex flex-column" style="width:240px;">

            <div class="d-flex justify-content-between align-items-center p-2 border-bottom">
                <span>Servidor</span>

                <button class="btn btn-sm btn-outline-light d-lg-none" data-bs-toggle="offcanvas"
                    data-bs-target="#serversMobile">
                    <i class="bi bi-layout-sidebar"></i>
                </button>
            </div>

            <div class="p-2 flex-grow-1 overflow-auto">

                <div class="d-flex justify-content-between small text-muted-x mb-2">
                    CANALES
                    <button class="btn btn-sm btn-link text-white p-0" data-bs-toggle="collapse"
                        data-bs-target="#channelsList">
                        <i class="bi bi-chevron-down"></i>
                    </button>
                </div>

                <div id="channelsList" class="collapse show">

                    <div class="channel active p-2 rounded d-flex gap-2">
                        <i class="bi bi-hash"></i> general
                    </div>

                    <div class="channel p-2 rounded d-flex gap-2">
                        <i class="bi bi-hash"></i> anuncios
                    </div>

                    <div class="channel p-2 rounded d-flex gap-2">
                        <i class="bi bi-hash"></i> dev
                    </div>

                </div>

            </div>

            <div class="p-2 bg-dark d-flex justify-content-between align-items-center">

                <div class="d-flex gap-2 align-items-center">
                    <div class="rounded-circle bg-primary" style="width:32px;height:32px"></div>
                    <div class="lh-1">
                        <div class="small">User</div>
                        <div class="text-muted-x" style="font-size:12px">online</div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <i class="bi bi-mic"></i>
                    <i class="bi bi-gear"></i>
                </div>

            </div>
        </div>

        <!-- CHAT -->
        <div class="flex-grow-1 d-flex flex-column bg-mid text-white">

            <!-- HEADER BOOTSTRAP NAVBAR -->
            <nav class="navbar navbar-dark bg-dark px-3">

                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-light d-lg-none" data-bs-toggle="offcanvas"
                        data-bs-target="#serversMobile">
                        ☰
                    </button>

                    <i class="bi bi-hash"></i>
                    <strong>general</strong>
                </div>

                <div class="dropdown">

                    <button class="btn btn-sm btn-dark dropdown-toggle" data-bs-toggle="dropdown">
                        Opciones
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Buscar</a></li>
                        <li><a class="dropdown-item" href="#">Pines</a></li>
                        <li><a class="dropdown-item" href="#">Miembros</a></li>
                    </ul>

                </div>

            </nav>

            <!-- CHAT MESSAGES -->
            <div class="flex-grow-1 overflow-auto p-3 chat-scroll">

                <div class="mb-4">
                    <h5>Bienvenido</h5>
                    <span class="text-muted-x">inicio del canal</span>
                </div>

                <div class="d-flex gap-2 mb-3">
                    <div class="rounded-circle bg-primary" style="width:40px;height:40px"></div>
                    <div>
                        <div class="fw-bold">Admin</div>
                        <div>mensaje demo</div>
                    </div>
                </div>

            </div>

            <!-- INPUT -->
            <div class="p-3 bg-dark">

                <div class="input-group bg-secondary rounded">

                    <span class="input-group-text bg-transparent border-0 text-white">
                        <i class="bi bi-plus-circle"></i>
                    </span>

                    <input class="form-control bg-transparent border-0 text-white shadow-none"
                        placeholder="Enviar mensaje">

                    <span class="input-group-text bg-transparent border-0 text-white">
                        <i class="bi bi-emoji-smile"></i>
                    </span>

                </div>

            </div>

        </div>

        <!-- MEMBERS (desktop only) -->
        <div class="d-none d-lg-block bg-side text-white p-3" style="width:240px">

            <div class="small text-muted-x mb-2">ONLINE</div>

            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="rounded-circle bg-success" style="width:32px;height:32px"></div>
                User
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
