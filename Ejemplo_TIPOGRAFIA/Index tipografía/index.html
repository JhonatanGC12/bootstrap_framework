<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <title>Tipografía Bootstrap</title>
</head>
<body>
    <!-- mt-5 = Margen arriba -->
    <div class="container mt-5">

    <h1 class="display-2 text-primary text-center">
      Bootstrap Tipografía
    </h1>

    <!-- 
    fs = font-size
    fw = font-weight
    -->
    <p class="fs-3 fw-bold text-success">
      Texto grande y en negrita
    </p>

    <!-- fst = font-style -->
    <p class="fst-italic text-danger">
      Texto cursivo rojo
    </p>

    <p class="text-uppercase text-secondary">
      texto en mayúsculas
    </p>

    <p class="text-decoration-underline">
      Texto subrayado
    </p>

    <button class="btn btn-dark">
      Botón Bootstrap
    </button>
  </div>
</body>
</html>
